<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SVG Overlay</title>
  <style>
    :root { color-scheme: light dark; }

    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 24px; }
    label { display: grid; gap: 6px; }
    input[type="file"] { width: 320px; }

    .frame {
      width: min(900px, 100%);
      aspect-ratio: 16 / 9;
      position: relative;
      overflow: hidden;
      border: 1px solid color-mix(in srgb, currentColor 50%, transparent);
      border-radius: 12px;
      background:
        linear-gradient(45deg, color-mix(in srgb, currentColor 10%, transparent) 25%, transparent 25%) 0 0/20px 20px,
        linear-gradient(45deg, transparent 75%, color-mix(in srgb, currentColor 10%, transparent) 75%) 0 0/20px 20px,
        linear-gradient(45deg, transparent 75%, color-mix(in srgb, currentColor 10%, transparent) 75%) 10px 10px/20px 20px,
        linear-gradient(45deg, color-mix(in srgb, currentColor 10%, transparent) 25%, transparent 25%) 10px 10px/20px 20px;
    }

    .layer {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
    }
    .layer svg { width: 100%; height: 100%; display: block; }

    /* Grid (layer 2): high visibility */
    #layerB { color: black; mix-blend-mode: difference; }
    @media (prefers-color-scheme: dark) { #layerB { color: white; } }
    @media (prefers-reduced-transparency: reduce) { #layerB { mix-blend-mode: normal; } }
  </style>
</head>

<body>
  <label>
    <h1>Test SVG Icon</h1>
    <input id="fileA" type="file" accept=".svg,image/svg+xml" />
  </label>

  <div class="frame" style="margin-top: 16px;">
    <div class="layer" id="layerA" aria-label="Laag 1"></div>
    <div class="layer" id="layerB" aria-label="Laag 2"></div>
  </div>

  <script>
    const fileA  = document.getElementById("fileA");
    const layerA = document.getElementById("layerA");
    const layerB = document.getElementById("layerB");

    const GRID_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 33.867 33.867"><g fill="none" stroke="currentColor" stroke-width=".262" transform="translate(-32.28 -138.642)"><circle cx="49.213" cy="155.575" r="15.744" opacity=".2" style="marker:none"/><rect width="27.255" height="27.255" x="35.585" y="141.948" opacity=".2" rx="2.097" ry="2.097" style="marker:none"/></g></svg>`;

    function toSvgElement(svgText) {
      const doc = new DOMParser().parseFromString(svgText, "image/svg+xml");
      const svg = doc.documentElement;
      if (!svg || svg.nodeName.toLowerCase() !== "svg") throw new Error("Geen geldige SVG.");

      svg.setAttribute("width", "100%");
      svg.setAttribute("height", "100%");
      svg.setAttribute("preserveAspectRatio", "xMidYMid meet");
      return svg;
    }

    function ensureViewBox(svg) {
      if (svg.getAttribute("viewBox")) return;

      // Needs to be in DOM for getBBox() to work reliably
      const old = svg.style.visibility;
      svg.style.visibility = "hidden";
      try {
        const b = svg.getBBox();
        const w = b.width  > 0 ? b.width  : 100;
        const h = b.height > 0 ? b.height : 100;
        svg.setAttribute("viewBox", `${b.x || 0} ${b.y || 0} ${w} ${h}`);
      } catch {
        svg.setAttribute("viewBox", "0 0 100 100");
      } finally {
        svg.style.visibility = old;
      }
    }

    // Init grid layer
    (function initGrid() {
      const grid = toSvgElement(GRID_SVG);
      layerB.replaceChildren(grid);
      // force strokes to follow currentColor (so CSS can invert)
      grid.querySelectorAll("[stroke], [style*='stroke:']").forEach(el => el.setAttribute("stroke", "currentColor"));
    })();

    fileA.addEventListener("change", async () => {
      const f = fileA.files?.[0];
      if (!f) return;

      const svg = toSvgElement(await f.text());
      layerA.replaceChildren(svg);
      ensureViewBox(svg);
    });
  </script>
</body>
</html>
