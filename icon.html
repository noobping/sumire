<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SVG Overlay</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 24px; display: block; }

    .top { display: grid; gap: 10px; max-width: 900px; }
    label { display: grid; gap: 6px; }
    input[type="file"] { width: 320px; }

    .editor {
        background: color-mix(in srgb, Canvas 95%, transparent);
      border-radius: 10px;
      border: 1px solid color-mix(in srgb, currentColor 25%, transparent);
        min-width: 420px;
        max-width: 100%;
        white-space: pre;
        overflow-x: auto;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 1.35;
      padding: 10px;
      white-space: pre-wrap;
      overflow-x: hidden;
    }

    .bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    button {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid color-mix(in srgb, currentColor 25%, transparent);
      background: color-mix(in srgb, Canvas 90%, transparent);
      cursor: pointer;
    }
    button:active { transform: translateY(1px); }

    .status { opacity: .8; }

    .frame {
      width: min(900px, 100%);
      aspect-ratio: 16 / 9;
      position: relative;
      overflow: hidden;
      margin-top: 14px;
      border: 1px solid color-mix(in srgb, currentColor 50%, transparent);
      border-radius: 12px;
      background:
        linear-gradient(45deg, color-mix(in srgb, currentColor 10%, transparent) 25%, transparent 25%) 0 0/20px 20px,
        linear-gradient(45deg, transparent 75%, color-mix(in srgb, currentColor 10%, transparent) 75%) 0 0/20px 20px,
        linear-gradient(45deg, transparent 75%, color-mix(in srgb, currentColor 10%, transparent) 75%) 10px 10px/20px 20px,
        linear-gradient(45deg, color-mix(in srgb, currentColor 10%, transparent) 25%, transparent 25%) 10px 10px/20px 20px;
    }

    .layer {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
    }
    .layer svg { width: 100%; height: 100%; display: block; }
    #layerA { pointer-events: auto; }
    #layerA svg { pointer-events: auto; }
    #layerA svg * { pointer-events: auto; }

    /* Grid overlay */
    #layerB { color: black; mix-blend-mode: difference; }
    @media (prefers-color-scheme: dark) { #layerB { color: white; } }
    @media (prefers-reduced-transparency: reduce) { #layerB { mix-blend-mode: normal; } }
    @media (min-width: 1100px) {
        body {
            display: grid;
            grid-template-columns: minmax(420px, 1fr) minmax(420px, 1fr);
            gap: 24px;
            align-items: start;
        }

        .top {
            max-width: none;
        }

        .frame {
            margin-top: 0; /* override inline margin if needed */
        }
    }
  </style>
</head>

<body>
  <div class="top">
    <h1>Test SVG Icon</h1>

    <label>
      <span>Upload SVG icon</span>
      <input id="fileA" type="file" accept=".svg,image/svg+xml" />
    </label>

    <label>
      <span>Edit SVG XML</span>
      <pre id="svgText" contenteditable="true" class="editor"></pre>
    </label>

    <div class="bar">
      <button id="applyBtn" type="button">Apply</button>
      <button id="formatBtn" type="button">Format</button>
      <span class="status" id="status">—</span>
    </div>
  </div>

  <div class="frame">
    <div class="layer" id="layerA" aria-label="Laag 1"></div>
    <div class="layer" id="layerB" aria-label="Laag 2"></div>
  </div>

  <script>
    const fileA   = document.getElementById("fileA");
    const layerA  = document.getElementById("layerA");
    const layerB  = document.getElementById("layerB");
    const svgText = document.getElementById("svgText");
    const status  = document.getElementById("status");
    const applyBtn  = document.getElementById("applyBtn");
    const formatBtn = document.getElementById("formatBtn");

    const GRID_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 33.867 33.867"><g fill="none" stroke="currentColor" stroke-width=".262" transform="translate(-32.28 -138.642)"><circle cx="49.213" cy="155.575" r="15.744" opacity=".2"/><rect width="27.255" height="27.255" x="35.585" y="141.948" opacity=".2" rx="2.097" ry="2.097"/></g></svg>`;

    function toSvgElement(svgXml) {
      const doc = new DOMParser().parseFromString(svgXml, "image/svg+xml");
      const svg = doc.documentElement;
      if (!svg || svg.nodeName.toLowerCase() !== "svg") throw new Error("Geen geldige SVG (geen <svg> root).");

      svg.setAttribute("width", "100%");
      svg.setAttribute("height", "100%");
      svg.setAttribute("preserveAspectRatio", "xMidYMid meet");
      return svg;
    }

    function ensureViewBox(svg) {
      if (svg.getAttribute("viewBox")) return;
      const old = svg.style.visibility;
      svg.style.visibility = "hidden";
      try {
        const b = svg.getBBox();
        svg.setAttribute("viewBox", `${b.x || 0} ${b.y || 0} ${Math.max(b.width, 1)} ${Math.max(b.height, 1)}`);
      } catch {
        svg.setAttribute("viewBox", "0 0 100 100");
      } finally {
        svg.style.visibility = old;
      }
    }

    function renderLayer1FromText(text) {
      const svg = toSvgElement(text);

      // Put into DOM first, then ensureViewBox (getBBox needs DOM)
      layerA.replaceChildren(svg);
      ensureViewBox(svg);
      enableSimpleSvgEditing(svg);

      status.textContent = "Rendered ✓";
    }

    function enableSimpleSvgEditing(svgRoot) {
        let selected = null;
        let dragging = false;

        function getState(el) {
        const t = el.getAttribute("transform") || "";
        const m = t.match(/translate\(([-\d.]+)[ ,]([-\d.]+)\)/);
        const s = t.match(/scale\(([-\d.]+)\)/);
        return {
            tx: m ? parseFloat(m[1]) : 0,
            ty: m ? parseFloat(m[2]) : 0,
            sc: s ? parseFloat(s[1]) : 1
        };
        }

        function setState(el, tx, ty, sc) {
        el.setAttribute("transform", `translate(${tx} ${ty}) scale(${sc})`);
        }

        function getSvgScale(svg) {
        // Convert screen px -> SVG units using CTM.
        // Use absolute values to avoid mirrored axes.
        const ctm = svg.getScreenCTM();
        if (!ctm) return { sx: 1, sy: 1 };
        return { sx: Math.abs(ctm.a) || 1, sy: Math.abs(ctm.d) || 1 };
        }

        svgRoot.addEventListener("pointerdown", (e) => {
        const el = e.target.closest("path, rect, circle, ellipse, polygon, polyline, line, g");
        if (!el || el === svgRoot) return;

        selected = el;
        dragging = true;

        svgRoot.setPointerCapture(e.pointerId);
        e.preventDefault();
        });

        svgRoot.addEventListener("pointermove", (e) => {
        if (!dragging || !selected) return;

        const st = getState(selected);
        const { sx, sy } = getSvgScale(svgRoot);

        // movementX/Y are in screen pixels; convert to SVG units
        const dx = e.movementX / sx;
        const dy = e.movementY / sy;

        setState(selected, st.tx + dx, st.ty + dy, st.sc);
        });

        function stopDrag() {
            if (dragging && selected) {
                syncSvgToEditor(svgRoot);
            }
            dragging = false;
        }

        svgRoot.addEventListener("pointerup", stopDrag);
        svgRoot.addEventListener("pointercancel", stopDrag);
        svgRoot.addEventListener("lostpointercapture", stopDrag);

        svgRoot.addEventListener("wheel", (e) => {
            if (!selected) return;
            e.preventDefault();

            const st = getState(selected);
            const factor = e.deltaY < 0 ? 1.05 : 0.95;
            const next = Math.min(20, Math.max(0.05, st.sc * factor));
            setState(selected, st.tx, st.ty, next);
            syncSvgToEditor(svgRoot);
        }, { passive: false });
    }

    let syncTimer = null;
    function syncSvgToEditor(svgRoot) {
        clearTimeout(syncTimer);
        syncTimer = setTimeout(() => {
        const serializer = new XMLSerializer();
        svgText.textContent = serializer.serializeToString(svgRoot);
        }, 150);
    }
    
    // Very basic formatter for XML (good enough for quick edits)
    function formatXml(xml) {
      const P = "  ";
      xml = xml.replace(/>\s+</g, "><");
      let pad = 0;
      return xml
        .replace(/</g, "\n<")
        .trim()
        .split("\n")
        .filter(Boolean)
        .map(line => {
          const isClosing = /^<\/.+>/.test(line);
          const isOpening = /^<[^!?/].*[^/]>$/.test(line);
          const isSelfClosing = /^<.*\/>$/.test(line);

          if (isClosing) pad = Math.max(pad - 1, 0);
          const out = P.repeat(pad) + line.trim();
          if (isOpening && !isSelfClosing) pad += 1;
          return out;
        })
        .join("\n")
        .trim();
    }

    // Debounce typing -> rerender
    let t = null;
    function scheduleRender() {
    clearTimeout(t);
    t = setTimeout(() => {
        const txt = svgText.textContent.trim();
        if (!txt) return;
        try {
        renderLayer1FromText(txt);
        } catch (e) {
        status.textContent = "Error: " + (e?.message || e);
        }
    }, 250);
    }

    // Init grid
    (function initGrid() {
      const grid = toSvgElement(GRID_SVG);
      layerB.replaceChildren(grid);
      grid.querySelectorAll("[stroke], [style*='stroke:']").forEach(el => el.setAttribute("stroke", "currentColor"));
    })();

    // Upload -> put file contents into textarea + render
    fileA.addEventListener("change", async () => {
    const f = fileA.files?.[0];
    if (!f) return;

    const txt = await f.text();
    svgText.textContent = txt;

    try {
        renderLayer1FromText(txt);
    } catch (e) {
        status.textContent = "Error: " + (e?.message || e);
    }
    });

    // Typing edits
    svgText.addEventListener("input", scheduleRender);

    // Manual apply
    applyBtn.addEventListener("click", () => {
        try {
            renderLayer1FromText(svgText.textContent.trim());
        } catch (e) {
            status.textContent = "Error: " + (e?.message || e);
        }
    });

    formatBtn.addEventListener("click", () => {
        svgText.textContent = formatXml(svgText.textContent);
        scheduleRender();
    });
  </script>
</body>
</html>
